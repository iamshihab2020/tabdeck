<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TabDeck</title>
<script>try{var p=localStorage.getItem('__td_pack')||'default';document.documentElement.dataset.pack=p;}catch(e){}</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --accent:#7c3aed;
    --accent-light:#a78bfa;
    --accent-bg:rgba(124,58,237,.16);
    --accent-glow:rgba(124,58,237,.32);
    --bg:#0d0f18;
    --bg-card:#131822;
    --bg-input:#181d2c;
    --bg-hover:#1e2336;
    --bg-active:#232840;
    --border:#252b3d;
    --border-hover:#353d58;
    --text:#e2e5f0;
    --text-muted:#5a6380;
    --text-sub:#8891a8;
    --radius:12px;
    --radius-sm:8px;
    --radius-xs:6px;
  }
  body{
    font-family:-apple-system,'Inter','Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
    width:340px;font-size:13px;line-height:1.5;
    overflow:hidden;
  }

  /* ── Header ── */
  .header{
    display:flex;align-items:center;gap:9px;
    padding:13px 16px 11px;
    border-bottom:1px solid var(--border);
  }
  .header-logo{
    width:26px;height:26px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;overflow:hidden;
  }
  .header-logo img{width:26px;height:26px;object-fit:contain;border-radius:7px}
  .header-name{font-weight:800;font-size:14.5px;letter-spacing:-.4px;color:var(--text)}
  .header-badge{
    margin-left:auto;font-size:10.5px;font-weight:600;
    background:var(--bg-input);color:var(--text-sub);
    padding:2px 9px;border-radius:99px;border:1px solid var(--border);
  }

  /* ── Page card ── */
  .page-card{
    margin:12px 14px 4px;
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 12px;
    display:flex;align-items:center;gap:10px;
  }
  .fav-wrap{
    width:32px;height:32px;border-radius:8px;
    background:var(--bg-input);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;overflow:hidden;
  }
  .fav-wrap img{width:18px;height:18px}
  .page-info{min-width:0;flex:1}
  .page-title-text{
    font-size:12.5px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);
  }
  .page-url-text{
    font-size:10.5px;color:var(--text-muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;
  }

  /* ── Form ── */
  .form{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px}

  .field{display:flex;flex-direction:column;gap:5px}
  .field-label{
    font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    color:var(--text-muted);padding-left:1px;
  }
  input{
    background:var(--bg-input);border:1.5px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);
    font-size:13px;padding:8.5px 11px;outline:none;
    transition:border-color .15s,box-shadow .15s;width:100%;font-family:inherit;
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
  input::placeholder{color:var(--text-muted)}

  /* ── Combobox ── */
  .combo{position:relative}
  .combo-trigger{
    width:100%;background:var(--bg-input);border:1.5px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);
    font-size:13px;padding:8.5px 11px;outline:none;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    transition:border-color .15s,box-shadow .15s;font-family:inherit;text-align:left;
  }
  .combo-trigger:hover{border-color:var(--border-hover)}
  .combo-trigger.open{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
  .combo-trigger-val{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .combo-trigger-val.placeholder{color:var(--text-muted)}
  .combo-chevron{flex-shrink:0;color:var(--text-muted);transition:transform .18s}
  .combo-trigger.open .combo-chevron{transform:rotate(180deg)}

  .combo-drop{
    position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:999;
    background:#1a1f2f;border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    box-shadow:0 8px 32px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);
    overflow:hidden;display:none;
    animation:dropIn .14s ease;
  }
  .combo-drop.open{display:block}
  @keyframes dropIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

  .combo-list{max-height:180px;overflow-y:auto;padding:4px}
  .combo-list::-webkit-scrollbar{width:4px}
  .combo-list::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:99px}

  .combo-item{
    display:flex;align-items:center;gap:9px;
    padding:8px 10px;border-radius:var(--radius-xs);cursor:pointer;
    font-size:13px;color:var(--text-sub);
    transition:background .1s,color .1s;position:relative;
  }
  .combo-item:hover{background:var(--bg-hover);color:var(--text)}
  .combo-item.selected{color:var(--text);background:var(--bg-active)}
  .combo-item-check{
    width:14px;height:14px;flex-shrink:0;margin-left:auto;
    color:var(--accent-light);opacity:0;
  }
  .combo-item.selected .combo-item-check{opacity:1}
  .combo-item-emoji{font-size:14px;flex-shrink:0;width:18px;text-align:center}
  .combo-item-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .combo-empty{padding:12px 10px;text-align:center;color:var(--text-muted);font-size:12px}

  /* ── Destination pills ── */
  .dest-row{display:flex;gap:7px}
  .dest-btn{
    flex:1;padding:8.5px 10px;border-radius:var(--radius-sm);
    background:var(--bg-input);border:1.5px solid var(--border);
    color:var(--text-sub);font-size:12px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:all .15s;font-family:inherit;
  }
  .dest-btn:hover{border-color:var(--border-hover);color:var(--text)}
  .dest-btn.active{
    background:var(--accent-bg);border-color:var(--accent);
    color:var(--accent-light);box-shadow:0 0 0 2px var(--accent-bg);
  }

  /* ── Folder row ── */
  .folder-row{display:flex;gap:7px;align-items:flex-end}
  .folder-row .field,.folder-row .combo-wrap{flex:1;min-width:0}
  .new-folder-btn{
    height:37px;width:37px;flex-shrink:0;
    background:var(--bg-input);border:1.5px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text-sub);
    cursor:pointer;font-size:21px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:all .15s;
  }
  .new-folder-btn:hover{border-color:var(--border-hover);color:var(--text)}
  .new-folder-btn.active{border-color:var(--accent);color:var(--accent-light)}

  /* ── Divider ── */
  .divider{height:1px;background:var(--border);margin:1px 0}

  /* ── Save button ── */
  .save-btn{
    width:100%;padding:11px;border-radius:var(--radius-sm);
    background:var(--accent);border:none;color:#fff;
    font-size:13.5px;font-weight:700;cursor:pointer;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:7px;
    transition:opacity .15s,transform .1s,box-shadow .15s;
    box-shadow:0 4px 18px var(--accent-glow);font-family:inherit;
  }
  .save-btn:hover{opacity:.9;box-shadow:0 6px 24px var(--accent-glow)}
  .save-btn:active{transform:scale(.98)}
  .save-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}

  /* ── Toast ── */
  .toast{
    margin:0 14px 12px;padding:9px 12px;border-radius:var(--radius-sm);
    font-size:12px;font-weight:600;text-align:center;display:none;
  }
  .toast.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
  .toast.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.28);color:#fca5a5}
  .toast.show{display:block}
  .empty{text-align:center;padding:24px 16px;color:var(--text-muted);font-size:12px;line-height:1.8}

  /* ========= BRUTAL PACK OVERRIDES ========= */
  [data-pack="brutal"]{
    --accent:#ff5da2;--accent-light:#0a0a0a;--accent-bg:#fef08a;--accent-glow:rgba(0,0,0,0);
    --bg:#fef9c3;--bg-card:#ffffff;--bg-input:#ffffff;--bg-hover:#fef08a;--bg-active:#facc15;
    --border:#0a0a0a;--border-hover:#0a0a0a;
    --text:#0a0a0a;--text-muted:#525252;--text-sub:#1f2937;
    --radius:0;--radius-sm:0;--radius-xs:0;
  }
  [data-pack="brutal"] body{font-family:'Space Grotesk','Inter',system-ui,sans-serif;}
  [data-pack="brutal"] .header{border-bottom:3px solid #0a0a0a;background:#0a0a0a;color:#fef9c3;padding:14px 16px;}
  [data-pack="brutal"] .header-name{color:#fef9c3;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
  [data-pack="brutal"] .header-logo{border-radius:0;border:2px solid #fef9c3;background:#facc15;}
  [data-pack="brutal"] .header-logo img{border-radius:0;}
  [data-pack="brutal"] .header-badge{background:#facc15;color:#0a0a0a;border:2px solid #fef9c3;border-radius:0;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
  [data-pack="brutal"] .page-card{border:3px solid #0a0a0a;border-radius:0;box-shadow:4px 4px 0 0 #0a0a0a;background:#ffffff;}
  [data-pack="brutal"] .fav-wrap{border:2px solid #0a0a0a;border-radius:0;background:#fef08a;}
  [data-pack="brutal"] .page-title-text{font-weight:700;}
  [data-pack="brutal"] .field-label{color:#0a0a0a;font-weight:800;}
  [data-pack="brutal"] input,
  [data-pack="brutal"] .combo-trigger,
  [data-pack="brutal"] .dest-btn,
  [data-pack="brutal"] .new-folder-btn{
    border:2.5px solid #0a0a0a !important;border-radius:0;background:#ffffff;color:#0a0a0a;font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:600;transition:none;
  }
  [data-pack="brutal"] input:focus,
  [data-pack="brutal"] .combo-trigger.open{box-shadow:3px 3px 0 0 #ff5da2;border-color:#0a0a0a;}
  [data-pack="brutal"] .combo-drop{border:3px solid #0a0a0a;border-radius:0;box-shadow:5px 5px 0 0 #0a0a0a;background:#ffffff;}
  [data-pack="brutal"] .combo-item{border-radius:0;color:#0a0a0a;font-family:'JetBrains Mono',ui-monospace,monospace;}
  [data-pack="brutal"] .combo-item:hover{background:#fef08a;color:#0a0a0a;}
  [data-pack="brutal"] .combo-item.selected{background:#facc15;color:#0a0a0a;}
  [data-pack="brutal"] .combo-item-check{color:#0a0a0a;}
  [data-pack="brutal"] .dest-btn{background:#ffffff;color:#0a0a0a;}
  [data-pack="brutal"] .dest-btn:hover{background:#fef08a;}
  [data-pack="brutal"] .dest-btn.active{background:#facc15;color:#0a0a0a;border-color:#0a0a0a;box-shadow:3px 3px 0 0 #0a0a0a;}
  [data-pack="brutal"] .new-folder-btn:hover{background:#fef08a;color:#0a0a0a;}
  [data-pack="brutal"] .new-folder-btn.active{background:#ff5da2;color:#0a0a0a;}
  [data-pack="brutal"] .divider{background:#0a0a0a;height:2px;}
  [data-pack="brutal"] .save-btn{
    background:#ff5da2;color:#0a0a0a;border:3px solid #0a0a0a;border-radius:0;
    box-shadow:5px 5px 0 0 #0a0a0a;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
    font-family:'Space Grotesk',sans-serif;transition:transform .05s,box-shadow .05s;
  }
  [data-pack="brutal"] .save-btn:hover{opacity:1;transform:translate(-1px,-1px);box-shadow:6px 6px 0 0 #0a0a0a;}
  [data-pack="brutal"] .save-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 0 #0a0a0a;}
  [data-pack="brutal"] .toast{border-radius:0;border:2.5px solid #0a0a0a;font-weight:700;text-transform:uppercase;}
  [data-pack="brutal"] .toast.ok{background:#a3e635;color:#0a0a0a;}
  [data-pack="brutal"] .toast.err{background:#ff5da2;color:#0a0a0a;}

  /* ========= ATELIER PACK OVERRIDES ========= */
  [data-pack="atelier"]{
    --accent:#7a2222;--accent-light:#a83838;--accent-bg:rgba(122,34,34,.10);--accent-glow:rgba(122,34,34,.18);
    --bg:#f4ede1;--bg-card:#fbf6ec;--bg-input:transparent;--bg-hover:rgba(122,34,34,.05);--bg-active:rgba(122,34,34,.10);
    --border:rgba(36,26,20,.14);--border-hover:rgba(36,26,20,.32);
    --text:#241a14;--text-muted:#8a7868;--text-sub:#5a4a3d;
    --radius:3px;--radius-sm:99px;--radius-xs:3px;
  }
  [data-pack="atelier"] body{
    font-family:'Manrope','Inter Tight',system-ui,sans-serif;
    background:radial-gradient(circle at 20% 10%,rgba(122,34,34,.025),transparent 50%),var(--bg);
  }
  [data-pack="atelier"] .header{border-bottom:1px solid var(--border);padding:16px 18px}
  [data-pack="atelier"] .header-name{
    font-family:'Fraunces',serif;font-weight:400;font-style:italic;font-size:18px;letter-spacing:-.02em;
  }
  [data-pack="atelier"] .header-logo{border-radius:50%;border:1px solid var(--border)}
  [data-pack="atelier"] .header-badge{
    background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:99px;
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;text-transform:none;letter-spacing:0;
  }
  [data-pack="atelier"] .page-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:3px;box-shadow:none;
  }
  [data-pack="atelier"] .fav-wrap{border:1px solid var(--border);border-radius:50%;background:var(--bg-card)}
  [data-pack="atelier"] .page-title-text{font-family:'Fraunces',serif;font-weight:500;font-size:14px;letter-spacing:-.01em}
  [data-pack="atelier"] .page-url-text{font-family:'Manrope',sans-serif;color:var(--text-muted)}
  [data-pack="atelier"] .field-label{
    font-family:'Fraunces',serif;font-style:italic;font-weight:500;
    text-transform:none;letter-spacing:0;color:var(--text-sub);font-size:12px;
  }
  [data-pack="atelier"] input,
  [data-pack="atelier"] .combo-trigger{
    background:transparent !important;border:none !important;border-bottom:1px solid var(--border) !important;
    border-radius:0 !important;color:var(--text) !important;
    font-family:'Manrope',sans-serif !important;padding:8px 4px !important;
  }
  [data-pack="atelier"] input:focus,
  [data-pack="atelier"] .combo-trigger.open{
    box-shadow:none !important;border-bottom-color:var(--accent) !important;
  }
  [data-pack="atelier"] input::placeholder{color:var(--text-muted);font-style:italic;font-family:'Fraunces',serif}
  [data-pack="atelier"] .combo-drop{
    background:var(--bg-card);border:1px solid var(--border);border-radius:3px;
    box-shadow:0 12px 32px -12px rgba(36,26,20,.3);
  }
  [data-pack="atelier"] .combo-item{border-radius:3px;color:var(--text);font-family:'Manrope',sans-serif}
  [data-pack="atelier"] .combo-item:hover{background:var(--bg-hover);color:var(--accent)}
  [data-pack="atelier"] .combo-item.selected{background:var(--bg-active);color:var(--accent)}
  [data-pack="atelier"] .combo-item-check{color:var(--accent)}
  [data-pack="atelier"] .dest-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:99px;
    font-family:'Manrope',sans-serif;font-weight:500;text-transform:none;letter-spacing:0;
  }
  [data-pack="atelier"] .dest-btn:hover{background:var(--bg-hover);color:var(--accent);border-color:var(--accent)}
  [data-pack="atelier"] .dest-btn.active{
    background:var(--accent-bg);border-color:var(--accent);color:var(--accent);box-shadow:none;
  }
  [data-pack="atelier"] .new-folder-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:50%;
  }
  [data-pack="atelier"] .new-folder-btn:hover{color:var(--accent);border-color:var(--accent)}
  [data-pack="atelier"] .divider{background:var(--border);height:1px}
  [data-pack="atelier"] .save-btn{
    background:var(--text);color:var(--bg);border:none;border-radius:99px;
    box-shadow:0 8px 20px -8px rgba(36,26,20,.4);
    font-family:'Manrope',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:12px;
    transition:all .25s cubic-bezier(.2,.6,.2,1);
  }
  [data-pack="atelier"] .save-btn:hover{background:var(--accent);color:#fbf6ec;transform:translateY(-1px);box-shadow:0 12px 28px -8px rgba(122,34,34,.4)}
  [data-pack="atelier"] .save-btn:active{transform:translateY(0);box-shadow:0 4px 12px -4px rgba(36,26,20,.3)}
  [data-pack="atelier"] .toast{border-radius:99px;border:1px solid var(--border);font-family:'Fraunces',serif;font-style:italic;font-weight:500;text-transform:none}
  [data-pack="atelier"] .toast.ok{background:rgba(107,125,79,.12);border-color:rgba(107,125,79,.3);color:#4a5836}
  [data-pack="atelier"] .toast.err{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

  /* ========= HOLODECK PACK OVERRIDES ========= */
  [data-pack="holodeck"]{
    --accent:#00e5ff;--accent-light:#7fffff;--accent-bg:rgba(0,229,255,.12);--accent-glow:rgba(0,229,255,.45);
    --bg:#050810;--bg-card:rgba(0,229,255,.04);--bg-input:rgba(0,229,255,.05);--bg-hover:rgba(0,229,255,.10);--bg-active:rgba(0,229,255,.18);
    --border:rgba(0,229,255,.20);--border-hover:rgba(0,229,255,.45);
    --text:#d4f1ff;--text-muted:#4a6080;--text-sub:#7090b8;
    --radius:0;--radius-sm:0;--radius-xs:0;
  }
  [data-pack="holodeck"] body{
    font-family:'Rajdhani','Chakra Petch',system-ui,sans-serif;
    background:
      repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,229,255,.03) 2px,rgba(0,229,255,.03) 3px),
      var(--bg);
    color:var(--text);
  }
  [data-pack="holodeck"] .header{border-bottom:1px solid var(--accent);padding:14px 16px;position:relative}
  [data-pack="holodeck"] .header::before,
  [data-pack="holodeck"] .header::after{content:'';position:absolute;width:8px;height:8px;border-color:var(--accent);border-style:solid}
  [data-pack="holodeck"] .header::before{top:-1px;left:-1px;border-width:1px 0 0 1px}
  [data-pack="holodeck"] .header::after{top:-1px;right:-1px;border-width:1px 1px 0 0}
  [data-pack="holodeck"] .header-name{
    font-family:'Chakra Petch',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.16em;
    color:var(--accent);text-shadow:0 0 8px var(--accent-glow);
  }
  [data-pack="holodeck"] .header-logo{border-radius:0;border:1px solid var(--accent);background:transparent}
  [data-pack="holodeck"] .header-logo img{border-radius:0}
  [data-pack="holodeck"] .header-badge{
    background:transparent;color:var(--accent);border:1px solid var(--accent);border-radius:0;
    font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-weight:400;
  }
  [data-pack="holodeck"] .page-card{
    background:var(--bg-card);border:1px solid var(--border);border-radius:0;box-shadow:inset 0 0 12px rgba(0,229,255,.05);
    position:relative;
  }
  [data-pack="holodeck"] .page-card::before,[data-pack="holodeck"] .page-card::after{content:'';position:absolute;width:6px;height:6px;border-color:var(--accent);border-style:solid;opacity:.6}
  [data-pack="holodeck"] .page-card::before{top:-1px;left:-1px;border-width:1px 0 0 1px}
  [data-pack="holodeck"] .page-card::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0}
  [data-pack="holodeck"] .fav-wrap{border:1px solid var(--accent);border-radius:0;background:var(--accent-bg)}
  [data-pack="holodeck"] .page-title-text{font-family:'Chakra Petch',sans-serif;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.04em;font-size:12px}
  [data-pack="holodeck"] .page-url-text{font-family:'Share Tech Mono',monospace;color:var(--text-sub)}
  [data-pack="holodeck"] .field-label{
    font-family:'Share Tech Mono',monospace;color:var(--accent);
    text-transform:uppercase;letter-spacing:.18em;font-size:10px;font-weight:400;
  }
  [data-pack="holodeck"] input,
  [data-pack="holodeck"] .combo-trigger{
    background:rgba(0,229,255,.05) !important;
    border:1px solid var(--border) !important;border-radius:0 !important;
    color:var(--text) !important;
    font-family:'Share Tech Mono',monospace !important;
    caret-color:var(--accent) !important;
  }
  [data-pack="holodeck"] input:focus,
  [data-pack="holodeck"] .combo-trigger.open{
    border-color:var(--accent) !important;
    box-shadow:0 0 12px rgba(0,229,255,.3),inset 0 0 6px rgba(0,229,255,.1) !important;
  }
  [data-pack="holodeck"] input::placeholder{color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}
  [data-pack="holodeck"] .combo-drop{
    background:var(--bg);border:1px solid var(--accent);border-radius:0;
    box-shadow:0 0 24px rgba(0,229,255,.25);
  }
  [data-pack="holodeck"] .combo-item{border-radius:0;color:var(--text);font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:.06em;font-size:11px}
  [data-pack="holodeck"] .combo-item:hover{background:var(--accent-bg);color:var(--accent)}
  [data-pack="holodeck"] .combo-item.selected{background:var(--accent-bg);color:var(--accent)}
  [data-pack="holodeck"] .combo-item-check{color:var(--accent)}
  [data-pack="holodeck"] .dest-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:0;
    font-family:'Share Tech Mono',monospace;font-weight:400;text-transform:uppercase;letter-spacing:.1em;
  }
  [data-pack="holodeck"] .dest-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
  [data-pack="holodeck"] .dest-btn.active{
    background:var(--accent-bg);border-color:var(--accent);color:var(--accent);
    box-shadow:0 0 12px rgba(0,229,255,.25),inset 0 0 6px rgba(0,229,255,.1);
  }
  [data-pack="holodeck"] .new-folder-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:0;
  }
  [data-pack="holodeck"] .new-folder-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
  [data-pack="holodeck"] .divider{background:var(--border);height:1px}
  [data-pack="holodeck"] .save-btn{
    background:transparent;color:var(--accent);
    border:1px solid var(--accent);border-radius:0;
    font-family:'Chakra Petch',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:12px;
    box-shadow:inset 0 0 12px rgba(0,229,255,.1),0 0 16px rgba(0,229,255,.2);
    transition:all .15s;
  }
  [data-pack="holodeck"] .save-btn:hover{background:var(--accent);color:#050810;box-shadow:0 0 24px var(--accent-glow)}
  [data-pack="holodeck"] .save-btn:active{transform:scale(.98)}
  [data-pack="holodeck"] .toast{border-radius:0;border:1px solid var(--accent);font-family:'Share Tech Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
  [data-pack="holodeck"] .toast.ok{background:rgba(77,255,159,.1);border-color:#4dff9f;color:#4dff9f}
  [data-pack="holodeck"] .toast.err{background:rgba(255,46,108,.12);border-color:#ff2e6c;color:#ff2e6c}

  /* ========= MONO PACK OVERRIDES ========= */
  [data-pack="mono"]{
    --accent:#3d6b4f;--accent-light:#4f8463;--accent-bg:rgba(61,107,79,.07);--accent-glow:transparent;
    --bg:#fafaf8;--bg-card:transparent;--bg-input:transparent;--bg-hover:rgba(23,23,23,.04);--bg-active:rgba(23,23,23,.07);
    --border:rgba(23,23,23,.08);--border-hover:rgba(23,23,23,.18);
    --text:#171717;--text-muted:#a3a3a3;--text-sub:#525252;
    --radius:4px;--radius-sm:99px;--radius-xs:4px;
  }
  [data-pack="mono"] body{
    font-family:'Onest','Inter Tight',system-ui,sans-serif;
    background:var(--bg);color:var(--text);
  }
  [data-pack="mono"] .header{border-bottom:1px solid var(--border);padding:16px 18px}
  [data-pack="mono"] .header-name{
    font-family:'Onest',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.02em;color:var(--text);
  }
  [data-pack="mono"] .header-logo{border-radius:50%;border:1px solid var(--border)}
  [data-pack="mono"] .header-logo img{border-radius:50%}
  [data-pack="mono"] .header-badge{
    background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:99px;
    font-family:'Onest',sans-serif;font-weight:400;text-transform:none;letter-spacing:0;
  }
  [data-pack="mono"] .page-card{
    background:transparent;border:1px solid var(--border);border-radius:4px;box-shadow:none;
  }
  [data-pack="mono"] .fav-wrap{border:1px solid var(--border);border-radius:6px;background:transparent}
  [data-pack="mono"] .page-title-text{font-family:'Onest',sans-serif;font-weight:600;font-size:13px;letter-spacing:-.01em;color:var(--text)}
  [data-pack="mono"] .page-url-text{font-family:'DM Mono',monospace;color:var(--text-muted)}
  [data-pack="mono"] .field-label{
    font-family:'Onest',sans-serif;font-weight:500;font-size:11px;
    text-transform:none;letter-spacing:0;color:var(--text-sub);
  }
  [data-pack="mono"] input,
  [data-pack="mono"] .combo-trigger{
    background:transparent !important;border:none !important;border-bottom:1px solid var(--border) !important;
    border-radius:0 !important;color:var(--text) !important;
    font-family:'Onest',sans-serif !important;padding:8px 4px !important;
  }
  [data-pack="mono"] input:focus,
  [data-pack="mono"] .combo-trigger.open{
    box-shadow:none !important;border-bottom-color:var(--accent) !important;
  }
  [data-pack="mono"] input::placeholder{color:var(--text-muted)}
  [data-pack="mono"] .combo-drop{
    background:#ffffff;border:1px solid var(--border);border-radius:4px;
    box-shadow:0 12px 32px -12px rgba(0,0,0,.18);
  }
  [data-pack="mono"] .combo-item{border-radius:4px;color:var(--text);font-family:'Onest',sans-serif}
  [data-pack="mono"] .combo-item:hover{background:var(--bg-hover);color:var(--text)}
  [data-pack="mono"] .combo-item.selected{background:var(--accent-bg);color:var(--accent)}
  [data-pack="mono"] .combo-item-check{color:var(--accent)}
  [data-pack="mono"] .dest-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:99px;
    font-family:'Onest',sans-serif;font-weight:500;text-transform:none;letter-spacing:0;
  }
  [data-pack="mono"] .dest-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-hover)}
  [data-pack="mono"] .dest-btn.active{
    background:var(--text);border-color:var(--text);color:var(--bg);box-shadow:none;
  }
  [data-pack="mono"] .new-folder-btn{
    background:transparent;color:var(--text-sub);border:1px solid var(--border);border-radius:50%;
  }
  [data-pack="mono"] .new-folder-btn:hover{color:var(--text);border-color:var(--border-hover)}
  [data-pack="mono"] .divider{background:var(--border);height:1px}
  [data-pack="mono"] .save-btn{
    background:var(--text);color:var(--bg);border:none;border-radius:99px;box-shadow:none;
    font-family:'Onest',sans-serif;font-weight:600;text-transform:none;letter-spacing:0;font-size:13px;
    transition:background .18s;
  }
  [data-pack="mono"] .save-btn:hover{background:var(--accent);transform:none;box-shadow:none}
  [data-pack="mono"] .save-btn:active{transform:scale(.99)}
  [data-pack="mono"] .toast{border-radius:99px;border:1px solid var(--border);font-family:'Onest',sans-serif;text-transform:none;letter-spacing:0;font-weight:500}
  [data-pack="mono"] .toast.ok{background:rgba(61,107,79,.08);border-color:rgba(61,107,79,.3);color:#3d6b4f}
  [data-pack="mono"] .toast.err{background:rgba(139,46,46,.08);border-color:rgba(139,46,46,.3);color:#8b2e2e}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><img src="assets/favicon.png" alt=""></div>
  <span class="header-name">TabDeck</span>
  <span class="header-badge">Save bookmark</span>
</div>

<div class="page-card">
  <div class="fav-wrap" id="pageFavicon">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5a6380" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
  </div>
  <div class="page-info">
    <div class="page-title-text" id="pageTitle">Loading…</div>
    <div class="page-url-text" id="pageUrl"></div>
  </div>
</div>

<div class="form" id="mainForm">
  <div class="field">
    <div class="field-label">Title</div>
    <input type="text" id="titleInput" placeholder="Page title" spellcheck="false">
  </div>

  <div class="field">
    <div class="field-label">Workspace</div>
    <div class="combo" id="wsCombo">
      <button class="combo-trigger" id="wsTrigger" type="button">
        <span class="combo-trigger-val placeholder" id="wsVal">Select workspace…</span>
        <svg class="combo-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
      </button>
      <div class="combo-drop" id="wsDrop">
        <div class="combo-list" id="wsList"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="field">
    <div class="field-label">Save to</div>
    <div class="dest-row">
      <button class="dest-btn active" id="destQuick" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        Quick Access
      </button>
      <button class="dest-btn" id="destFolder" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Folder
      </button>
    </div>
  </div>

  <div id="folderRow" style="display:none" class="folder-row">
    <div class="field" style="flex:1;min-width:0">
      <div class="field-label">Folder</div>
      <div class="combo" id="folderCombo">
        <button class="combo-trigger" id="folderTrigger" type="button">
          <span class="combo-trigger-val placeholder" id="folderVal">Select folder…</span>
          <svg class="combo-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6,9 12,15 18,9"/></svg>
        </button>
        <div class="combo-drop" id="folderDrop">
          <div class="combo-list" id="folderList"></div>
        </div>
      </div>
    </div>
    <button class="new-folder-btn" id="newFolderBtn" type="button">+</button>
  </div>

  <div id="newFolderRow" style="display:none" class="field">
    <div class="field-label">New folder name</div>
    <input type="text" id="newFolderInput" placeholder="e.g. Design">
  </div>

  <button class="save-btn" id="saveBtn" type="button">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
    Save Bookmark
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="js/popup.js" defer></script>
</body>
</html>
